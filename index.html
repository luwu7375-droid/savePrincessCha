<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>救公主</title>
  <link rel="stylesheet" href="style.css?v=cloudflare-0047">
</head>
<body>
  <!-- 登录 overlay -->
  <div id="loginOverlay" class="overlay hidden">
    <div class="modal" style="max-width:360px;max-height:none">
      <div class="modal-header"><span>救公主</span></div>
      <div style="padding:0 18px 18px">
        <input id="loginEmail" type="email" placeholder="邮箱地址">
        <input id="loginPassword" type="password" placeholder="密码">
        <div id="loginMsg" style="font-size:13px;color:var(--text-muted);min-height:20px;margin-bottom:12px"></div>
        <button id="loginBtn" type="button">登录</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- 会话侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>会话</span>
        <button id="newConvButton" type="button">＋ 新建</button>
      </div>
      <ul id="convList"></ul>
      <div class="sidebar-footer">
        <button id="systemButton" type="button" class="sidebar-footer-btn">系统</button>
        <button id="storySeedsBtn" type="button" class="sidebar-footer-btn">关系史</button>
        <button id="logoutBtn" type="button" class="sidebar-footer-btn hidden">退出</button>
        <!-- 기능 버튼: 숨김이지만 JS 참조 유지 -->
        <button id="distillButton" type="button" style="display:none"></button>
        <button id="toggleMemoryButton" type="button" style="display:none"></button>
      </div>
    </aside>

    <!-- 主聊天区 -->
    <main class="chat-shell">
      <header class="top-bar">
        <button id="sidebarToggle" type="button" class="icon-btn" title="会话列表">☰</button>
        <h1>救公主</h1>
        <span id="chatStatus" class="chat-status"></span>
        <button id="moreButton" type="button" class="icon-btn" title="更多">⋯</button>
      </header>

      <section class="message-list" id="messageList" aria-label="消息列表"></section>

      <div class="tier-bar" id="tierBar" role="group" aria-label="模型档位">
        <button type="button" class="tier-btn" data-tier="instant">Instant</button>
        <button type="button" class="tier-btn" data-tier="general">General</button>
        <button type="button" class="tier-btn" data-tier="advanced">Advanced</button>
        <!-- mobile: single dropdown replaces the three buttons -->
        <button type="button" id="tierDropdownBtn" class="tier-dropdown-btn" aria-label="选择模型档位">
          <span id="tierDropdownLabel">General</span><svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-left:4px;opacity:0.6"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div id="imagePreviewBar" class="image-preview-bar hidden">
        <div class="img-preview-wrap">
          <img class="img-preview-thumb" src="" alt="预览">
          <button type="button" id="imgPreviewRemove" class="img-preview-remove" aria-label="删除图片">✕</button>
        </div>
      </div>

      <form class="input-bar" id="chatForm">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button id="imageAttachBtn" type="button" class="ghost-icon-btn desktop-only-btn" title="附图" aria-label="附图"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="6.5" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 12.5L5.5 9L8.5 12L11 9.5L16 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <input id="messageInput" type="text" placeholder="继续说…" autocomplete="off">
        <!-- desktop secondary btns -->
        <button id="forceReplyBtn" type="button" class="ghost-icon-btn desktop-only-btn" title="让公主回复" aria-label="让公主回复">✦</button>
        <button id="autoReplyToggle" type="button" class="ghost-icon-btn desktop-only-btn" title="自动接话：关" aria-label="自动接话：关">◌</button>
        <!-- mobile composer menu btn -->
        <button id="composerMenuBtn" type="button" class="ghost-icon-btn mobile-composer-btn" title="更多操作" aria-label="更多操作">✦</button>
        <button id="sendButton" type="submit" aria-label="发送"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 15V3M9 3L4 8M9 3L14 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </form>
    </main>
  </div>

  <!-- 记忆弹窗 -->
  <div id="memoryOverlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>记忆库</span>
        <button id="closeMemoryButton" type="button">✕</button>
      </div>
      <div id="memoryList"></div>
      <div class="memory-add">
        <select id="memoryDomainSelect" aria-label="Memory domain">
          <option value="general">general</option>
          <option value="persona">persona</option>
          <option value="work">work</option>
          <option value="writing">writing</option>
          <option value="life">life</option>
          <option value="relation">relation</option>
        </select>
        <input id="memoryInput" type="text" placeholder="新增记忆...">
        <button id="addMemoryButton" type="button">添加</button>
      </div>
    </div>
  </div>

  <!-- 系统设置弹窗 -->
  <div id="systemOverlay" class="overlay hidden">
    <div class="modal" style="max-width:320px">
      <div class="modal-header">
        <span>系统设置</span>
        <button id="closeSystemButton" type="button">✕</button>
      </div>
      <div style="padding:12px 18px 18px">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">主题</div>
        <div id="themeOptions" style="display:flex;flex-direction:column;gap:6px;">
          <button type="button" class="theme-option-btn" data-theme-mode="system">跟随系统</button>
          <button type="button" class="theme-option-btn" data-theme-mode="light">浅色</button>
          <button type="button" class="theme-option-btn" data-theme-mode="dark">深色</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 关系史弹窗 -->
  <div id="storySeedsOverlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>关系史</span>
        <button id="closeStorySeedsButton" type="button">✕</button>
      </div>
      <div id="storySeedsList" style="padding:12px 18px 18px;font-size:13px;overflow-y:auto;flex:1;"></div>
    </div>
  </div>

  <script src="public-config.js?v=cloudflare-0047" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=cloudflare-0047" charset="utf-8"></script>
</body>
</html>
