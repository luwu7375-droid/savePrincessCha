<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>救公主</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <!-- 会话侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>会话</span>
        <button id="newConvButton" type="button">＋ 新建</button>
      </div>
      <ul id="convList"></ul>
    </aside>

    <!-- 主聊天区 -->
    <main class="chat-shell">
      <header class="top-bar">
        <button id="sidebarToggle" type="button" class="icon-btn" title="会话列表">☰</button>
        <h1>救公主</h1>
        <div class="top-actions">
          <button id="themeButton" type="button" class="icon-btn">☀️</button>
          <button id="toggleMemoryButton" type="button" class="icon-btn">记忆</button>
          <button id="clearButton" type="button" class="icon-btn">清空</button>
        </div>
      </header>

      <section class="message-list" id="messageList" aria-label="消息列表">
        <div class="msg-row assistant"><div class="avatar"></div><div class="message assistant">欢迎来到救公主。</div></div>
      </section>

      <form class="input-bar" id="chatForm">
        <input id="messageInput" type="text" placeholder="输入消息..." autocomplete="off">
      </form>
    </main>
  </div>

  <!-- 记忆弹窗 -->
  <div id="memoryOverlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>记忆库</span>
        <button id="closeMemoryButton" type="button">✕</button>
      </div>
      <div id="memoryList"></div>
      <div class="memory-add">
        <input id="memoryInput" type="text" placeholder="新增记忆...">
        <button id="addMemoryButton" type="button">添加</button>
      </div>
    </div>
  </div>

  <script src="public-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
