<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>救公主</title>
  <link rel="stylesheet" href="style.css?v=cloudflare-0014">
</head>
<body>
  <!-- 登录 overlay -->
  <div id="loginOverlay" class="overlay hidden">
    <div class="modal" style="max-width:360px;max-height:none">
      <div class="modal-header"><span>救公主</span></div>
      <div style="padding:0 18px 18px">
        <input id="loginEmail" type="email" placeholder="邮箱地址">
        <input id="loginPassword" type="password" placeholder="密码">
        <div id="loginMsg" style="font-size:13px;color:var(--text-muted);min-height:20px;margin-bottom:12px"></div>
        <button id="loginBtn" type="button">登录</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- 会话侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>会话</span>
        <button id="newConvButton" type="button">＋ 新建</button>
      </div>
      <ul id="convList"></ul>
    </aside>

    <!-- 主聊天区 -->
    <main class="chat-shell">
      <header class="top-bar">
        <button id="sidebarToggle" type="button" class="icon-btn" title="会话列表">☰</button>
        <h1>救公主</h1>
        <span id="chatStatus" class="chat-status"></span>
        <div class="top-actions">
          <span id="userEmailLabel" class="user-email-label"></span>
          <button id="themeButton" type="button" class="icon-btn">☀️</button>
          <button id="distillButton" type="button" class="icon-btn">沉淀</button>
          <button id="toggleMemoryButton" type="button" class="icon-btn">记忆匣</button>
          <button id="clearButton" type="button" class="icon-btn">清理本段</button>
          <button id="logoutBtn" type="button" class="icon-btn hidden">退出</button>
        </div>
      </header>

      <section class="message-list" id="messageList" aria-label="消息列表"></section>

      <form class="input-bar" id="chatForm">
        <input id="messageInput" type="text" placeholder="继续说…" autocomplete="off">
        <button id="forceReplyBtn" type="button" class="ghost-icon-btn" title="让公主回复" aria-label="让公主回复">✦</button>
        <button id="autoReplyToggle" type="button" class="ghost-icon-btn" title="自动接话：关" aria-label="自动接话：关">◌</button>
        <button id="sendButton" type="submit" aria-label="发送"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 15V3M9 3L4 8M9 3L14 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </form>
    </main>
  </div>

  <!-- 记忆弹窗 -->
  <div id="memoryOverlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>记忆库</span>
        <button id="closeMemoryButton" type="button">✕</button>
      </div>
      <div id="memoryList"></div>
      <div class="memory-add">
        <input id="memoryInput" type="text" placeholder="新增记忆...">
        <button id="addMemoryButton" type="button">添加</button>
      </div>
    </div>
  </div>

  <script src="public-config.js?v=cloudflare-0014" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=cloudflare-0014" charset="utf-8"></script>
</body>
</html>
