<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewport Debug Panel</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 12px;
      background: #f5f5f5;
      font-size: 12px;
      line-height: 1.4;
    }
    .debug-section {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .debug-section h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #333;
    }
    .debug-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    .debug-row:last-child {
      border-bottom: none;
    }
    .debug-label {
      color: #666;
      font-weight: 500;
    }
    .debug-value {
      color: #000;
      font-family: monospace;
    }
    .center-offset {
      font-size: 16px;
      font-weight: bold;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      margin: 12px 0;
    }
    .center-offset.good {
      background: #d4edda;
      color: #155724;
    }
    .center-offset.bad {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    button:active {
      opacity: 0.7;
    }
    .status {
      padding: 8px;
      background: #fff3cd;
      border-radius: 4px;
      margin-bottom: 12px;
      text-align: center;
      color: #856404;
    }
  </style>
</head>
<body>
  <h2 style="margin-top: 0;">Viewport Alignment Debug</h2>

  <div class="status" id="status">准备就绪</div>

  <button onclick="runDebug()">📊 运行诊断</button>
  <button onclick="startMonitoring()">🎬 开始监控 (10次/秒)</button>
  <button onclick="stopMonitoring()">⏹️ 停止监控</button>
  <button onclick="copyToClipboard()">📋 复制数据</button>
  <button onclick="clearDebug()">🗑️ 清空</button>

  <div id="result"></div>

  <script>
    let lastData = null;
    let monitoringInterval = null;
    let captureHistory = [];

    function startMonitoring() {
      const status = document.getElementById('status');
      if (monitoringInterval) {
        alert('监控已在运行中');
        return;
      }

      captureHistory = [];
      status.textContent = '🎬 监控中... 请在主页面点击输入框';

      monitoringInterval = setInterval(() => {
        if (typeof window.opener?.__debugHorizontalAlignment === 'function') {
          const result = window.opener.__debugHorizontalAlignment();
          const analysis = result.analysis || {};

          captureHistory.push({
            timestamp: Date.now(),
            relativeCenterOffset: analysis.relativeCenterOffset || 0,
            layoutAbsoluteOffset: analysis.absoluteOffsets?.layout || 0,
            rightOverflow: analysis.rightOverflow?.layout || 0,
            data: result.data,
            analysis: analysis
          });

          // 只保留最近 50 条
          if (captureHistory.length > 50) {
            captureHistory.shift();
          }

          // 如果发现问题，立即显示并停止
          const hasRelativeOffset = Math.abs(analysis.relativeCenterOffset || 0) > 1;
          const hasAbsoluteOffset = Math.abs(analysis.absoluteOffsets?.layout || 0) > 1;
          const hasOverflow = (analysis.rightOverflow?.layout || 0) > 0;

          if (hasRelativeOffset || hasAbsoluteOffset || hasOverflow) {
            displayResult(result);
            stopMonitoring();
            let issues = [];
            if (hasRelativeOffset) issues.push('相对偏移');
            if (hasAbsoluteOffset) issues.push('绝对偏移');
            if (hasOverflow) issues.push('右侧溢出');
            status.textContent = '❌ 检测到问题: ' + issues.join(', ') + ' - 已停止监控';
            lastData = {
              captureTime: new Date().toLocaleTimeString(),
              ...result,
              history: captureHistory
            };
          }
        }
      }, 100); // 10次/秒
    }

    function stopMonitoring() {
      if (monitoringInterval) {
        clearInterval(monitoringInterval);
        monitoringInterval = null;
        const status = document.getElementById('status');
        status.textContent = '⏹️ 监控已停止 - 共捕获 ' + captureHistory.length + ' 个样本';

        // 显示历史最大偏移
        if (captureHistory.length > 0) {
          const maxRelativeOffset = Math.max(...captureHistory.map(h => Math.abs(h.relativeCenterOffset || 0)));
          const maxAbsoluteOffset = Math.max(...captureHistory.map(h => Math.abs(h.layoutAbsoluteOffset || 0)));
          const maxOverflow = Math.max(...captureHistory.map(h => h.rightOverflow || 0));
          status.textContent += ' - 最大相对偏移: ' + maxRelativeOffset.toFixed(2) + 'px';
          status.textContent += ' - 最大绝对偏移: ' + maxAbsoluteOffset.toFixed(2) + 'px';
          if (maxOverflow > 0) {
            status.textContent += ' - 最大溢出: ' + maxOverflow.toFixed(2) + 'px';
          }
        }
      }
    }

    function runDebug() {
      const status = document.getElementById('status');
      status.textContent = '正在分析...';

      setTimeout(() => {
        if (typeof window.opener?.__debugHorizontalAlignment === 'function') {
          const result = window.opener.__debugHorizontalAlignment();
          lastData = result;
          displayResult(result);
          status.textContent = '✅ 分析完成 - ' + new Date().toLocaleTimeString();
        } else {
          status.textContent = '❌ 错误：无法访问主页面';
          alert('请确保这个页面是从 chat 页面打开的！');
        }
      }, 100);
    }

    function displayResult(result) {
      const container = document.getElementById('result');
      const { data, analysis } = result;

      let html = '';

      // 关键指标摘要
      const relativeOk = Math.abs(analysis.relativeCenterOffset) <= 1;
      const layoutCenteredOk = Math.abs(analysis.absoluteOffsets.layout) <= 1;
      const noOverflow = analysis.rightOverflow.layout <= 0 && analysis.rightOverflow.topBar <= 0 && analysis.rightOverflow.inputBar <= 0;

      const allOk = relativeOk && layoutCenteredOk && noOverflow;
      const offsetClass = allOk ? 'good' : 'bad';
      const offsetEmoji = allOk ? '✅' : '❌';

      html += `<div class="center-offset ${offsetClass}">
        ${offsetEmoji} ${allOk ? '对齐正常' : '检测到问题'}
      </div>`;

      // 诊断摘要
      html += '<div class="debug-section"><h3>🔍 诊断摘要</h3>';
      html += makeRow('屏幕宽度', data.screen.innerWidth + 'px');
      html += makeRow('屏幕中心', analysis.screenCenterX + 'px', 'highlight');
      html += makeRow('相对偏移 (inputBar-topBar)', analysis.relativeCenterOffset + 'px', relativeOk ? '' : 'highlight');
      html += makeRow('.layout 居中偏移', analysis.absoluteOffsets.layout + 'px', layoutCenteredOk ? '' : 'highlight');
      html += makeRow('.topBar 居中偏移', analysis.absoluteOffsets.topBar + 'px');
      html += makeRow('.inputBar 居中偏移', analysis.absoluteOffsets.inputBar + 'px');
      html += '</div>';

      // 右侧溢出检测
      html += '<div class="debug-section"><h3>⚠️ 右侧溢出检测</h3>';
      html += makeRow('.layout 右溢出', analysis.rightOverflow.layout + 'px', analysis.rightOverflow.layout > 0 ? 'highlight' : '');
      html += makeRow('.topBar 右溢出', analysis.rightOverflow.topBar + 'px', analysis.rightOverflow.topBar > 0 ? 'highlight' : '');
      html += makeRow('.inputBar 右溢出', analysis.rightOverflow.inputBar + 'px', analysis.rightOverflow.inputBar > 0 ? 'highlight' : '');
      html += '</div>';

      // CSS 变量
      html += '<div class="debug-section"><h3>🎨 CSS 变量</h3>';
      html += makeRow('--vv-offset-left', analysis.cssVariables.vvOffsetLeft, analysis.cssVariables.vvOffsetLeft !== '0px' ? 'highlight' : '');
      html += makeRow('--kb', analysis.cssVariables.kb);
      html += makeRow('visualViewport.offsetLeft', data.visualViewport.offsetLeft + 'px', data.visualViewport.offsetLeft !== 0 ? 'highlight' : '');
      html += '</div>';

      // Visual Viewport
      html += '<div class="debug-section"><h3>📱 Visual Viewport</h3>';
      html += makeRow('offsetLeft', data.visualViewport.offsetLeft);
      html += makeRow('offsetTop', data.visualViewport.offsetTop);
      html += makeRow('width', data.visualViewport.width);
      html += makeRow('height', data.visualViewport.height);
      html += makeRow('scale', data.visualViewport.scale);
      html += '</div>';

      // Window
      html += '<div class="debug-section"><h3>🪟 Window</h3>';
      html += makeRow('innerWidth', data.window.innerWidth);
      html += makeRow('scrollX', data.window.scrollX);
      html += makeRow('scrollY', data.window.scrollY);
      html += '</div>';

      // Layout
      html += '<div class="debug-section"><h3>📦 .layout</h3>';
      html += makeRow('left', data.layout.left, data.layout.left < -1 ? 'highlight' : '');
      html += makeRow('right', data.layout.right);
      html += makeRow('width', data.layout.width);
      html += makeRow('centerX', data.layout.centerX, 'highlight');
      html += makeRow('offsetFromCenter', data.layout.offsetFromScreenCenter + 'px', Math.abs(data.layout.offsetFromScreenCenter) > 1 ? 'highlight' : '');
      html += makeRow('transform', data.layout.transform);
      html += makeRow('position', data.layout.position);
      html += '</div>';

      // Chat Shell
      html += '<div class="debug-section"><h3>💬 .chat-shell</h3>';
      html += makeRow('left', data.chatShell.left);
      html += makeRow('right', data.chatShell.right);
      html += makeRow('width', data.chatShell.width);
      html += '</div>';

      // Top Bar
      html += '<div class="debug-section"><h3>📌 .top-bar</h3>';
      html += makeRow('left', data.topBar.left);
      html += makeRow('right', data.topBar.right);
      html += makeRow('width', data.topBar.width);
      html += makeRow('centerX', data.topBar.centerX, 'highlight');
      html += makeRow('offsetFromCenter', data.topBar.offsetFromScreenCenter + 'px');
      html += '</div>';

      // Message List
      html += '<div class="debug-section"><h3>📜 .message-list</h3>';
      html += makeRow('left', data.messageList.left);
      html += makeRow('right', data.messageList.right);
      html += makeRow('width', data.messageList.width);
      html += makeRow('centerX', data.messageList.centerX, 'highlight');
      html += '</div>';

      // Input Bar
      html += '<div class="debug-section"><h3>⌨️ .input-bar</h3>';
      html += makeRow('left', data.inputBar.left);
      html += makeRow('right', data.inputBar.right);
      html += makeRow('width', data.inputBar.width);
      html += makeRow('centerX', data.inputBar.centerX, 'highlight');
      html += makeRow('offsetFromCenter', data.inputBar.offsetFromScreenCenter + 'px');
      html += makeRow('marginLeft', data.inputBar.marginLeft);
      html += makeRow('marginRight', data.inputBar.marginRight);
      html += makeRow('maxWidth', data.inputBar.maxWidth);
      html += '</div>';

      container.innerHTML = html;
    }

    function makeRow(label, value, highlight) {
      const style = highlight ? 'style="background: #fffbcc;"' : '';
      return `<div class="debug-row" ${style}>
        <span class="debug-label">${label}</span>
        <span class="debug-value">${value}</span>
      </div>`;
    }

    function copyToClipboard() {
      if (!lastData) {
        alert('请先运行诊断！');
        return;
      }

      const text = JSON.stringify(lastData, null, 2);

      // 尝试使用 Clipboard API
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          alert('✅ 数据已复制到剪贴板');
        }).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert('✅ 数据已复制到剪贴板');
      } catch (err) {
        alert('❌ 复制失败，请手动复制控制台输出');
        console.log(text);
      }
      document.body.removeChild(textarea);
    }

    function clearDebug() {
      document.getElementById('result').innerHTML = '';
      document.getElementById('status').textContent = '准备就绪';
      lastData = null;
      captureHistory = [];
      if (monitoringInterval) {
        stopMonitoring();
      }
    }

    // 页面关闭时停止监控
    window.addEventListener('beforeunload', () => {
      if (monitoringInterval) {
        clearInterval(monitoringInterval);
      }
    });
  </script>
</body>
</html>
